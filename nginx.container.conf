server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ $uri.html $uri/index.html =404;
  }

  location ~* \.(css|js|mjs|png|jpg|jpeg|gif|svg|ico|webp|avif|woff|woff2|ttf|otf)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  location = /index.html {
    add_header Cache-Control "public, max-age=300";
  }

  location ~* \.html$ {
    add_header Cache-Control "public, max-age=300";
    try_files $uri =404;
  }
}
